{# Shared report-card behavior (copy-for-text, squad/self grade toggle,
   tap tooltips, table heatmap, live regrade, breakdown sync) used by BOTH
   the squad dash (index.html) and the Solo Dash (solo.html). Extracted from
   index.html — edit HERE, not per-page. #}
<script>
// ── Report card copy-to-clipboard ────────────────────────────
// One block per player: ━━ name · grade ━━ header, then fixed line roles
// (vibe/form → record → game squares → 🔫 gunfight → 💥 damage/survival →
// 🎯 objective → 🔥/🚨 stat outliers → ⭐/💀 outlier GAMES). Values first,
// letter grades in parens, no squad-average clutter.
// Verbal performance tiers from the squad-relative composite percentile
// (0-100, 50 = squad's historical median).
// MID is centered on 50 (average play IS mid); below ~42 reads as bad.
const PERF_TIERS = [
  [90, '🔥 GODLIKE'], [75, '😤 COOKING'], [60, '💪 STRONG'],
  [42, '😐 MID'], [28, '🥴 ROUGH'], [14, '🗑️ TRASH'], [0, '💩 DOGSHIT'],
];
function perfTier(p) {
  for (const [min, label] of PERF_TIERS) if (p >= min) return label;
  return PERF_TIERS[PERF_TIERS.length - 1][1];
}
// Colored-square sparkline for grades (session trend + per-game).
const GRADE_SQ = { S: '🟩', A: '🟩', B: '🟨', C: '🟧', D: '🟥', F: '🟥' };
const sqOf = (g) => GRADE_SQ[(g || '').replace(/[+\-]$/, '')] || '⬜';
const ord = (n) => { const s = ['th', 'st', 'nd', 'rd'], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); };

// Build the grade-over-time sparkline block (shared by both copy buttons).
function gradeTrendLines() {
  const panel = document.querySelector('.grade-timeline-panel');
  if (!panel) return [];
  const items = Array.from(panel.querySelectorAll('.gt-legend-item'));
  if (!items.length) return [];
  const count = panel.getAttribute('data-count') || '';
  const lines = [`📈 Grade trend${count ? ' (last ' + count + ' sessions)' : ''}`];
  const wide = Math.max(...items.map(i => (i.getAttribute('data-player') || '').length));
  items.forEach(i => {
    const name = (i.getAttribute('data-player') || '').padEnd(wide);
    const emoji = i.getAttribute('data-emoji') || '';
    const trend = i.getAttribute('data-trend-pct') || i.getAttribute('data-trend') || '';
    lines.push(`${name}  ${emoji}  ${trend}`);
  });
  lines.push('🟩 hot · 🟨 fine · 🟧 meh · 🟥 cold  (numbers = /100 vs squad)');
  return lines;
}

function copyGradeTimeline() {
  const lines = gradeTrendLines();
  if (!lines.length) return;
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('gt-copy-btn');
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => { btn.textContent = '📋 Copy trend'; }, 2500); }
  }).catch(() => prompt('Copy this:', text));
}

function copyReportCard(pfx) {
  pfx = pfx || 'rc';
  const cardsWrap = document.getElementById(pfx + '-cards');
  if (!cardsWrap) return;
  const section = cardsWrap.closest('section');
  const cards = cardsWrap.querySelectorAll('.rc-card');
  if (!cards.length) return;

  const meta = section.querySelector('.report-card-meta');
  const metaText = meta ? meta.innerText.replace(/\s+/g, ' ').trim() : '';
  const titleEl = section.querySelector('.section-label');
  const cardTitle = (titleEl ? titleEl.innerText.replace(/\s+/g, ' ').trim() : 'Session Report Card')
    .replace(/\s*(SOLO|SQUAD)\s*$/i, '');

  // Session ranking vs the last 30 days
  const rankEl = section.querySelector('.rc-rank-chip');
  const rankLine = rankEl ? ('🏆 Ranked ' + (rankEl.getAttribute('data-copy') || rankEl.innerText.replace(/\s+/g, ' ').trim())) : '';

  // Opposition summary (enemy team, averaged over the session)
  const enemyEl = section.querySelector('.rc-enemy-strip');
  const enemyLine = enemyEl ? ('⚔️ Opposition: ' + (enemyEl.getAttribute('data-copy') || '')) : '';

  // Stack-size + solo session records, condensed to one line
  let recordLine = '';
  const recWrap = section.querySelector('.rc-records');
  if (recWrap) {
    const chips = Array.from(recWrap.querySelectorAll('.rc-record-chip'));
    const parts = chips.map(c => {
      const kind = c.querySelector('.rc-record-kind')?.innerText.trim() ?? '';
      const val = c.querySelector('.rc-record-val')?.innerText.trim() ?? '';
      return `${kind} ${val}`;
    }).filter(Boolean);
    if (parts.length) recordLine = '🏅 ' + parts.join(' · ');
  }

  // Session score → letter grade (same ladder as the site's grades)
  const gradeOf = (p) => p >= 90 ? 'S' : p >= 83 ? 'A+' : p >= 75 ? 'A' : p >= 67 ? 'A-'
    : p >= 58 ? 'B+' : p >= 50 ? 'B' : p >= 42 ? 'B-' : p >= 33 ? 'C+' : p >= 25 ? 'C'
    : p >= 17 ? 'C-' : p >= 10 ? 'D+' : p >= 6 ? 'D' : p >= 3 ? 'D-' : 'F';
  // Personal form: tonight's composite minus the player's own 365d norm
  // (both on the squad game scale) — positive = better than they normally do.
  const formOf = (d) => d >= 15 ? '🔥 way above their usual' : d >= 6 ? '▲ above their usual'
    : d > -6 ? '⚖️ typical for them' : d > -15 ? '🔻 below their usual' : '🧊 way off their usual';

  const blocks = Array.from(cards).map(card => {
    const name  = card.querySelector('.rc-card-name')?.innerText.trim() ?? '';
    const badge = card.querySelector('.grade-badge');
    const compPct = parseFloat(badge?.getAttribute('data-pct-squad') ?? '');
    const formPct = parseFloat(card.getAttribute('data-form') ?? '');
    const usual = parseFloat(card.getAttribute('data-usual') ?? '');

    // All graded stats: value + squad letter grade + squad percentile
    const statInfo = {};
    card.querySelectorAll('.rc-stat').forEach(s => {
      const label = (s.querySelector('.rc-stat-label')?.innerText.trim() ?? '').toUpperCase();
      const sg = s.querySelector('.sub-grade');
      const pct = parseFloat(sg?.getAttribute('data-pct') ?? '');
      const grade = sg?.getAttribute('data-grade-squad') ?? '';
      const valNode = s.querySelector('.rc-stat-val');
      let val = '';
      if (valNode) {
        valNode.childNodes.forEach(n => {
          if (n.nodeType === 3) val += n.textContent;
          else if (!n.classList?.contains('sub-grade')) val += n.textContent;
        });
        val = val.replace(/\s+/g, ' ').trim();
      }
      statInfo[label] = { pct, val, grade };
    });
    // "<value> <name> (<grade>)" — value first, letter in parens
    const st = (label, show) => {
      const s = statInfo[label];
      if (!s || !s.val || s.val === '—') return '';
      return `${s.val} ${show}${s.grade ? ` (${s.grade})` : ''}`;
    };

    // Acc + K/D/A from the card footer
    const footerSpans = Array.from(card.querySelectorAll('.rc-card-footer span'));
    const accVal = (footerSpans.find(s => s.innerText.startsWith('Acc'))?.innerText.trim() ?? '')
      .replace(/^Acc\s*/, '');
    const kdaSplit = (footerSpans.find(s => /^K\s/.test(s.innerText))?.innerText ?? '')
      .replace(/[KDA]\s*/g, '').split('·').map(x => x.trim()).filter(Boolean).join('/');

    // Stats grouped by ROLE: gunfight → damage/survival → objective
    const slayLine = [st('KDA', 'KDA'), kdaSplit ? `${kdaSplit} K/D/A per gm` : '',
                      accVal ? `${accVal} acc` : ''].filter(Boolean).join(' · ');
    const dmgLine  = [st('DMG±/G', 'dmg diff/g'), st('DMG/M', 'dmg/min'),
                      st('LIFE', 'avg life')].filter(Boolean).join(' · ');
    const objLine  = [st('OBJSC', 'obj score'), st('OBJ/MIN', 'obj/min'),
                      st('SC%', 'score share')].filter(Boolean).join(' · ');

    const record = (card.querySelector('.rc-card-record')?.innerText ?? '')
      .replace(/\s*\/\s*/g, '/').replace(/\s+/g, ' ').trim();

    // every-game sparkline (colored squares)
    const gg = card.querySelector('.rc-game-grades');
    let gamesLine = '';
    if (gg) {
      const chips = Array.from(gg.querySelectorAll('.rcg-chip')).map(c => sqOf(c.innerText.trim()));
      if (chips.length) gamesLine = chips.join('');
    }

    // Session-level OUTLIER STATS — anything elite (≥70th) or awful (≤20th)
    const NICE = { 'KDA': 'slaying', 'OBJ/MIN': 'objective pace',
                   'DMG±/G': 'damage trades', 'LIFE': 'survival', 'OBJSC': 'objective play',
                   'SC%': 'score share', 'DMG/M': 'damage output' };
    const entries = Object.entries(statInfo).filter(([, s]) => Number.isFinite(s.pct));
    const hot = entries.filter(([, s]) => s.pct >= 70).sort((a, b) => b[1].pct - a[1].pct)
      .map(([l, s]) => `${NICE[l] || l} (${ord(Math.round(s.pct))})`);
    const cold = entries.filter(([, s]) => s.pct <= 20).sort((a, b) => a[1].pct - b[1].pct)
      .map(([l, s]) => `${NICE[l] || l} (${ord(Math.round(s.pct))})`);

    // OUTLIER GAMES — standout individual games, good and bad. ⭐ = the
    // server's "worth a rewatch" flags (kill counts, huge obj scores, clean
    // sheets, S/A+ games); 💀 = D/F stinkers.
    const gitems = Array.from(card.querySelectorAll('.rcg-gitem')).map(li => ({
      num: li.dataset.num || '', grade: li.dataset.grade || '',
      score: parseFloat(li.dataset.score ?? ''), result: li.dataset.result || '',
      map: li.dataset.map || '', mode: li.dataset.mode || '',
      k: li.dataset.k || '', d: li.dataset.d || '', a: li.dataset.a || '',
      watch: li.dataset.watch || '',
    }));
    const fmtGame = g => `G${g.num} ${g.result} · ${g.mode} on ${g.map} · ${g.k}/${g.d}/${g.a}`;
    const starGames = gitems.filter(g => g.watch)
      .sort((a, b) => (b.score || 0) - (a.score || 0)).slice(0, 2)
      .map(g => `⭐ ${fmtGame(g)} — ${g.watch}`);
    const roughGames = gitems.filter(g => /^[DF]/.test(g.grade) && !g.watch)
      .sort((a, b) => (a.score || 0) - (b.score || 0)).slice(0, 1)
      .map(g => `💀 ${fmtGame(g)} — rough one (${g.grade})`);

    // ━━ name · grade ━━ header, then vibe + personal form on line 2
    const p = Math.round(compPct);
    const letter = Number.isFinite(compPct) ? gradeOf(p) : '';
    const tierEmoji = Number.isFinite(compPct) ? perfTier(p).split(' ')[0] : '🎮';
    const COMMENT = { S: 'unconscious', A: 'cooked', B: 'a solid shift',
                      C: 'below par', D: 'a rough one', F: 'one to forget' };
    const comment = letter ? (COMMENT[letter.replace(/[+\-]/, '')] || '') : '';
    const form = Number.isFinite(formPct)
      ? `${formOf(formPct)}${Number.isFinite(usual) ? ` (norm ${gradeOf(Math.round(usual))})` : ''}`
      : '';
    const vibeLine = [comment ? `${tierEmoji} ${comment}` : '', form].filter(Boolean).join(' · ');
    return [
      `━━ ${name} · ${letter || '—'} ━━`,
      ...(vibeLine ? [vibeLine] : []),
      record,
      ...(gamesLine ? [gamesLine] : []),
      ...(slayLine ? [`🔫 ${slayLine}`] : []),
      ...(dmgLine ? [`💥 ${dmgLine}`] : []),
      ...(objLine ? [`🎯 ${objLine}`] : []),
      ...(hot.length ? [`🔥 elite: ${hot.join(' · ')}`] : []),
      ...(cold.length ? [`🚨 rough: ${cold.join(' · ')}`] : []),
      ...starGames,
      ...roughGames,
    ].join('\n');
  });

  // Grading weights = the stats most correlated with our wins (data-driven)
  const weightsEl = section.querySelector('.rc-weights-copy');
  const weightsLine = weightsEl ? ('⚖️ graded on what wins our games: ' + (weightsEl.getAttribute('data-copy') || '')) : '';

  const text = [
    '🎮 ' + cardTitle + (metaText ? ' — ' + metaText : ''),
    ...(rankLine ? [rankLine] : []),
    ...(enemyLine ? [enemyLine] : []),
    ...(recordLine ? [recordLine] : []),
    '',
    blocks.join('\n\n'),
    '',
    ...(weightsLine ? [weightsLine] : []),
    'ℹ️ letters = graded vs every squad game in the past 365 days · “72nd” = squad percentile · form = vs your own year of games',
  ].join('\n');

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(pfx + '-copy-btn');
    if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => { btn.textContent = '📋 Copy for text'; }, 2500); }
  }).catch(() => {
    prompt('Copy this:', text);
  });
}

// ── Report-card grading mode toggle (squad-wide vs self-relative) ──
// Both grade sets are baked into data-*-squad / data-*-self attributes;
// this just swaps which one is shown. Default = squad. Persisted per browser.
const RC_GRADE_CLASSES = ['grade-s','grade-a','grade-b','grade-c','grade-d','grade-f'];
const RC_HEAT_CLASSES = ['heat-excellent','heat-good','heat-average','heat-below','heat-poor'];

function applyGradeMode(mode) {
  mode = (mode === 'self') ? 'self' : 'squad';
  // grade letter + colour + tip (sub-grades and composite badges)
  document.querySelectorAll('[data-grade-squad]').forEach(el => {
    const g = el.getAttribute('data-grade-' + mode);
    const c = el.getAttribute('data-gclass-' + mode);
    const t = el.getAttribute('data-gtip-' + mode);
    if (g !== null) el.textContent = g;
    if (t !== null) el.title = t;
    if (c !== null) { RC_GRADE_CLASSES.forEach(x => el.classList.remove(x)); if (c) el.classList.add(c); }
  });
  // class-only grade tint (e.g. the rc-card wrapper border)
  document.querySelectorAll('[data-gclass-squad]:not([data-grade-squad])').forEach(el => {
    const c = el.getAttribute('data-gclass-' + mode);
    RC_GRADE_CLASSES.forEach(x => el.classList.remove(x)); if (c) el.classList.add(c);
  });
  // heat tint on stat values
  document.querySelectorAll('[data-heat-squad]').forEach(el => {
    const h = el.getAttribute('data-heat-' + mode);
    RC_HEAT_CLASSES.forEach(x => el.classList.remove(x)); if (h) el.classList.add(h);
  });
  // descriptive labels
  document.querySelectorAll('[data-label-squad]').forEach(el => {
    const v = el.getAttribute('data-label-' + mode);
    if (v !== null) el.textContent = v;
  });
  // toggle button label
  document.querySelectorAll('.rc-grade-toggle').forEach(b => {
    b.textContent = (mode === 'self') ? '👤 Self grading' : '⚖️ Squad grading';
  });
  window.__haloGradeMode = mode;
  try { localStorage.setItem('haloGradeMode', mode); } catch (e) {}
}

function toggleGradeMode() {
  applyGradeMode((window.__haloGradeMode === 'squad' || !window.__haloGradeMode) ? 'self' : 'squad');
}

document.addEventListener('DOMContentLoaded', function () {
  let m = 'squad';
  try { m = localStorage.getItem('haloGradeMode') || 'squad'; } catch (e) {}
  applyGradeMode(m);
});

// ── Tap-to-reveal tooltips (touch has no hover, so title= never shows) ──
(function () {
  let tipEl = null;
  function hideTip() { if (tipEl) { tipEl.remove(); tipEl = null; } }
  function showTip(target) {
    const text = target.getAttribute('title') || target.getAttribute('data-tip');
    if (!text) return;
    hideTip();
    tipEl = document.createElement('div');
    tipEl.className = 'tap-tooltip';
    tipEl.textContent = text;
    tipEl.__host = target;
    document.body.appendChild(tipEl);
    const r = target.getBoundingClientRect();
    const tr = tipEl.getBoundingClientRect();
    const vw = document.documentElement.clientWidth;
    let left = r.left + r.width / 2 - tr.width / 2 + window.scrollX;
    left = Math.max(window.scrollX + 8, Math.min(left, window.scrollX + vw - tr.width - 8));
    let top = r.top + window.scrollY - tr.height - 8;
    if (top < window.scrollY + 4) top = r.bottom + window.scrollY + 8; // flip below if no room above
    tipEl.style.left = left + 'px';
    tipEl.style.top = top + 'px';
  }
  document.addEventListener('click', function (e) {
    const touchish = window.matchMedia('(hover: none)').matches || window.innerWidth <= 720;
    if (!touchish) { hideTip(); return; }
    const tappable = e.target.closest('.mobile-obj-chip, .rc-obj, .rc-hill, .rc-stat, .rc-baseline-pill');
    let host = null;
    if (tappable) {
      if (tappable.getAttribute('title')) host = tappable;
      else { const c = tappable.querySelector('[title]'); if (c) host = c; }
    }
    if (host && host.getAttribute('title')) {
      e.preventDefault();
      const same = tipEl && tipEl.__host === host;
      hideTip();
      if (!same) showTip(host);  // tap same chip again to dismiss
    } else {
      hideTip();
    }
  }, true);
  window.addEventListener('scroll', hideTip, { passive: true });
  window.addEventListener('resize', hideTip);
})();

// ── Report-card table heatmap ────────────────────────────────
// Every tintable cell carries a server-computed data-pct = that stat's
// percentile vs the squad's 365-day history (0=bad → 100=good; deaths /
// dmg-taken are pre-inverted server side). Tint is NEVER relative across
// the rows on screen — a table of one plays by the same rules as a table
// of eight. data-val remains for sorting only.
function applyRcHeatmap(pfx) {
  const table = document.getElementById((pfx || 'rc') + '-detail-table');
  if (!table) return;
  table.querySelectorAll('tbody td[data-pct]').forEach(td => {
    const p = parseFloat(td.getAttribute('data-pct'));
    if (!isNaN(p)) td.style.background = heatColor(p / 100);
  });
}

function heatColor(t) {
  // red → neutral → green
  if (t >= 0.5) {
    const s = (t - 0.5) * 2;
    const r = Math.round(65 + (22 - 65) * s);
    const g = Math.round(82 + (163 - 82) * s);
    const b = Math.round(52 + (74 - 52) * s);
    return `rgba(${r},${g},${b},${0.18 + s * 0.28})`;
  } else {
    const s = (0.5 - t) * 2;
    const r = Math.round(65 + (127 - 65) * s);
    const g = Math.round(82 + (29 - 82) * s);
    const b = Math.round(52 + (29 - 52) * s);
    return `rgba(${r},${g},${b},${0.18 + s * 0.30})`;
  }
}

// 'rc' = squad/solo session table · 'rcall' = /solo all-players table.
// Each call is a harmless no-op on pages where that table is absent.
document.addEventListener('DOMContentLoaded', function () { applyRcHeatmap('rc'); applyRcHeatmap('rcall'); });

// ── Live add/remove games → recompute the WHOLE card (grade + all stats) ──
const RC_ACTIVE_STRIPS = new Set();
const RC_GRADE_CLS = ['grade-s', 'grade-a', 'grade-b', 'grade-c', 'grade-d', 'grade-f'];
const RC_HEAT_CLS = ['heat-excellent', 'heat-good', 'heat-average', 'heat-below', 'heat-poor'];
function swapClass(el, family, newCls) {
  if (!el) return;
  // Only strip the specific grade-letter / heat classes — NOT base classes like
  // "grade-badge" or "rc-heat" which also start with those prefixes.
  (family === 'grade' ? RC_GRADE_CLS : RC_HEAT_CLS).forEach(c => el.classList.remove(c));
  if (newCls) newCls.split(/\s+/).forEach(c => c && el.classList.add(c));
}
function snapshotCard(card) {
  if (card.__snap) return;
  const snap = { grade: null, cardCls: '', stats: {}, record: '', footer: '' };
  const gb = card.querySelector('.rc-card-top .grade-badge');
  if (gb) snap.grade = { t: gb.textContent, c: gb.className };
  snap.cardCls = card.className;
  card.querySelectorAll('.rc-stat[data-stat]').forEach(st => {
    const v = st.querySelector('.rc-stat-val'); const sg = st.querySelector('.sub-grade');
    snap.stats[st.dataset.stat] = { vt: v ? v.textContent : '', vc: v ? v.className : '', gt: sg ? sg.textContent : '', gc: sg ? sg.className : '' };
  });
  const rec = card.querySelector('.rc-card-record'); snap.record = rec ? rec.innerHTML : '';
  const foot = card.querySelector('.rc-card-footer'); snap.footer = foot ? foot.innerHTML : '';
  card.__snap = snap;
}
function restoreCard(card) {
  const s = card.__snap; if (!s) return;
  const gb = card.querySelector('.rc-card-top .grade-badge');
  if (gb && s.grade) { gb.textContent = s.grade.t; gb.className = s.grade.c; }
  card.className = s.cardCls;
  card.querySelectorAll('.rc-stat[data-stat]').forEach(st => {
    const o = s.stats[st.dataset.stat]; if (!o) return;
    const v = st.querySelector('.rc-stat-val'); const sg = st.querySelector('.sub-grade');
    if (v) { v.textContent = o.vt; v.className = o.vc; }
    if (sg) { sg.textContent = o.gt; sg.className = o.gc; }
  });
  const rec = card.querySelector('.rc-card-record'); if (rec) rec.innerHTML = s.record;
  const foot = card.querySelector('.rc-card-footer'); if (foot) foot.innerHTML = s.footer;
}
function patchCard(card, d) {
  const gb = card.querySelector('.rc-card-top .grade-badge');
  if (gb) { gb.textContent = d.grade; swapClass(gb, 'grade', d.grade_class); }
  swapClass(card, 'grade', d.grade_class);
  Object.entries(d.stats || {}).forEach(([k, cell]) => {
    const st = card.querySelector(`.rc-stat[data-stat="${k}"]`); if (!st) return;
    const v = st.querySelector('.rc-stat-val'); const sg = st.querySelector('.sub-grade');
    if (v) { v.textContent = cell.val; swapClass(v, 'heat', cell.heat); }
    if (sg) { sg.textContent = cell.grade; swapClass(sg, 'grade', cell.grade_class); }
  });
  const rec = card.querySelector('.rc-card-record');
  if (rec && d.extra) rec.innerHTML = `${d.record} &nbsp;·&nbsp; ${d.win_pct} &nbsp;·&nbsp; <span class="rcg-adj-note">adjusted</span>`;
  const foot = card.querySelector('.rc-card-footer');
  if (foot && d.extra) {
    const spans = foot.querySelectorAll('span');
    if (spans[0]) spans[0].textContent = `Acc ${d.extra.accuracy}`;
    if (spans[1]) spans[1].textContent = `K ${d.extra.kills} · D ${d.extra.deaths} · A ${d.extra.assists}`;
  }
}

function initRegrade() {
  document.querySelectorAll('.rc-game-grades').forEach(strip => {
    const player = strip.dataset.player;
    const origGrade = strip.dataset.origGrade || '';
    const origClass = strip.dataset.origClass || '';
    const card = strip.closest('.rc-card');
    const chips = Array.from(strip.querySelectorAll('.rcg-chip'));
    const items = Array.from(strip.querySelectorAll('.rcg-gitem'));
    const adj = strip.querySelector('.rcg-adjusted');
    const count = strip.querySelector('.rcg-count');
    const reset = strip.querySelector('.rcg-reset');
    if (!chips.length || !adj || !card) return;
    let timer = null;
    const setGrade = (g, cls) => { adj.textContent = g; adj.className = 'rcg-adjusted inline-grade ' + (cls || ''); };

    // Reflect a mid's on/off state across BOTH the chip strip and the list.
    function setState(mid, off) {
      chips.forEach(c => { if (c.dataset.mid === mid) c.classList.toggle('rcg-off', off); });
      items.forEach(li => { if (li.dataset.mid === mid) { li.classList.toggle('rcg-off', off); const cb = li.querySelector('input'); if (cb) cb.checked = !off; } });
    }

    strip.__recompute = function recompute() {
      const included = chips.filter(c => !c.classList.contains('rcg-off')).map(c => c.dataset.mid);
      const dropped = chips.length - included.length;
      strip.classList.toggle('rcg-active', dropped > 0);
      if (dropped > 0) RC_ACTIVE_STRIPS.add(strip); else RC_ACTIVE_STRIPS.delete(strip);
      if (dropped === 0) { setGrade(origGrade, origClass); count.textContent = ''; restoreCard(card); return; }
      if (included.length === 0) { setGrade('—', ''); count.textContent = '(0 games)'; return; }
      snapshotCard(card);
      const mode = (localStorage.getItem('haloGradeMode') === 'self') ? 'self' : 'squad';
      count.textContent = '(computing…)';
      clearTimeout(timer);
      timer = setTimeout(() => {
        fetch(`/api/regrade?player=${encodeURIComponent(player)}&mode=${mode}&games=${included.join(',')}`)
          .then(r => r.json())
          .then(d => {
            if (d && d.ok) { setGrade(d.grade, d.grade_class); count.textContent = `(${d.games} of ${chips.length} · was ${origGrade})`; patchCard(card, d); }
            else { count.textContent = ''; }
          })
          .catch(() => { count.textContent = ''; });
      }, 160);
    };

    chips.forEach(c => c.addEventListener('click', () => { setState(c.dataset.mid, !c.classList.contains('rcg-off')); strip.__recompute(); }));
    items.forEach(li => {
      const cb = li.querySelector('input');
      const toggle = () => { setState(li.dataset.mid, cb ? !cb.checked : !li.classList.contains('rcg-off')); strip.__recompute(); };
      if (cb) cb.addEventListener('change', () => { setState(li.dataset.mid, !cb.checked); strip.__recompute(); });
    });
    if (reset) reset.addEventListener('click', () => {
      chips.forEach(c => c.classList.remove('rcg-off'));
      items.forEach(li => { li.classList.remove('rcg-off'); const cb = li.querySelector('input'); if (cb) cb.checked = true; });
      strip.__recompute();
      if (typeof applyGradeMode === 'function') applyGradeMode((localStorage.getItem('haloGradeMode') === 'self') ? 'self' : 'squad');
    });
  });
}
document.addEventListener('DOMContentLoaded', initRegrade);
// Re-run any adjusted cards when the squad/self grade mode flips.
document.addEventListener('click', e => {
  if (e.target.closest('.rc-grade-toggle')) setTimeout(() => RC_ACTIVE_STRIPS.forEach(s => s.__recompute && s.__recompute()), 30);
});

// On DESKTOP, opening one player's game-by-game breakdown opens them all —
// the vertical space is already committed, so show every player's games at once.
function initGameBreakdownSync() {
  if (!window.matchMedia('(min-width: 721px)').matches) return;
  document.querySelectorAll('.rc-cards').forEach(wrap => {
    const dets = Array.from(wrap.querySelectorAll('.rcg-games'));
    let syncing = false;
    dets.forEach(d => d.addEventListener('toggle', () => {
      if (syncing) return;
      syncing = true;
      dets.forEach(o => { if (o !== d) o.open = d.open; });
      syncing = false;
    }));
  });
}
document.addEventListener('DOMContentLoaded', initGameBreakdownSync);
</script>
