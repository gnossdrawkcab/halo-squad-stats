<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#241f2e"/>
      <stop offset="55%" stop-color="#141119"/>
      <stop offset="100%" stop-color="#0a090e"/>
    </radialGradient>
    <linearGradient id="hot" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff9d4d"/>
      <stop offset="100%" stop-color="#ffe08a"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7a1c0b"/>
      <stop offset="100%" stop-color="#e04a1f"/>
    </linearGradient>
    <linearGradient id="baseG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#a33009"/>
    </linearGradient>
    <linearGradient id="ringG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity=".15"/>
      <stop offset="50%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity=".15"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ringlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="0" y="0" width="512" height="512" rx="92" fill="url(#bgGlow)"/>
  <rect x="11" y="11" width="490" height="490" rx="83" fill="none" stroke="#ff7a3d" stroke-opacity=".3" stroke-width="5"/>

  <!-- halo ring, fully behind the crown -->
  <g filter="url(#ringlow)">
    <ellipse cx="256" cy="212" rx="168" ry="46" fill="none" stroke="url(#ringG)" stroke-width="10"/>
  </g>

  <!-- crown -->
  <g filter="url(#glow)">
    <!-- outer fins -->
    <polygon points="120,338 104,232 158,300 158,338" fill="url(#hot)"/>
    <polygon points="120,338 104,232 132,296 132,338" fill="url(#ember)"/>
    <polygon points="392,338 408,232 354,300 354,338" fill="url(#ember)"/>
    <polygon points="392,338 408,232 380,296 380,338" fill="url(#hot)"/>
    <!-- left blade -->
    <polygon points="168,338 176,238 152,150 192,242 192,338" fill="url(#hot)"/>
    <polygon points="192,338 192,242 152,150 214,236 214,338" fill="url(#ember)"/>
    <!-- right blade -->
    <polygon points="344,338 336,238 360,150 320,242 320,338" fill="url(#ember)"/>
    <polygon points="320,338 320,242 360,150 298,236 298,338" fill="url(#hot)"/>
    <!-- center blade -->
    <polygon points="232,338 242,210 256,84 256,338" fill="url(#hot)"/>
    <polygon points="280,338 270,210 256,84 256,338" fill="url(#ember)"/>
    <!-- base band, beveled -->
    <polygon points="118,346 394,346 376,384 136,384" fill="url(#baseG)"/>
    <polygon points="118,346 394,346 388,360 124,360" fill="#ffd07a" opacity=".5"/>
    <!-- notched underline -->
    <rect x="140" y="394" width="70" height="12" rx="6" fill="#b83a12"/>
    <rect x="221" y="394" width="70" height="12" rx="6" fill="#b83a12"/>
    <rect x="302" y="394" width="70" height="12" rx="6" fill="#b83a12"/>
  </g>

  <!-- tip sparks -->
  <circle cx="256" cy="84" r="8" fill="#fff3c4" filter="url(#glow)"/>
  <circle cx="152" cy="150" r="5" fill="#fff3c4" filter="url(#glow)"/>
  <circle cx="360" cy="150" r="5" fill="#fff3c4" filter="url(#glow)"/>
</svg>
